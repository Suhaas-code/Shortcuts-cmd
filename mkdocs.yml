site_name: shortcuts
site_description: Your personal keyboard-shortcut cheat sheet, one command away, in every shell
site_url: https://Suhaas-code.github.io/shortcuts-cmd/
repo_url: https://github.com/Suhaas-code/shortcuts-cmd
repo_name: Suhaas-code/shortcuts-cmd
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

theme:
  name: material
  logo: shortcuts-logo.jpg
  favicon: shortcuts-logo.jpg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - CLI Reference: reference.md
  - Customization: customization.md
  - Colors: colors.md
  - Architecture: architecture.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Suhaas-code/shortcuts-cmd
